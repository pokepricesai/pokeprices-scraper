name: Nightly Scrape

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  # —— 6 parallel batch scrape jobs ——————————————————————————————————
  batch1:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 1
        run: python pokeprices_scraper_v8.py --sets-file batches/batch1.txt

  batch2:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 2
        run: python pokeprices_scraper_v8.py --sets-file batches/batch2.txt

  batch3:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 3
        run: python pokeprices_scraper_v8.py --sets-file batches/batch3.txt

  batch4:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 4
        run: python pokeprices_scraper_v8.py --sets-file batches/batch4.txt

  batch5:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 5
        run: python pokeprices_scraper_v8.py --sets-file batches/batch5.txt

  batch6:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run batch 6
        run: python pokeprices_scraper_v8.py --sets-file batches/batch6.txt

  # —— eBay API scraper (runs in parallel with batches) ———————————————
  ebay-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run eBay scraper
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ebay_scraper.py

  # —— Refresh card_trends + compute analytics ———————————————————————
  refresh-and-analytics:
    runs-on: ubuntu-latest
    needs: [batch1, batch2, batch3, batch4, batch5, batch6]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests

      - name: Refresh card_trends
        run: python refresh_card_trends.py

      - name: Scrape set prices (median + value history)
        continue-on-error: true
        run: python scrape_set_prices.py

      - name: Compute analytics (metrics, spread, set metrics)
        # Only runs on Sundays (weekly) or manual triggers — pulls 3.5M rows, too slow for nightly
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 0'
        continue-on-error: true
        run: python compute_analytics.py

      - name: Refresh Pokémon species stats
        continue-on-error: true
        run: python refresh_pokemon_species.py

      - name: Strip Pokemon prefix from set names
        run: |
          curl -s -X POST \
            "$SUPABASE_URL/rest/v1/rpc/strip_pokemon_prefix" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "Pokemon prefix stripped from set names"

  # —— Detect deals (runs after analytics complete) ———————————————————
  detect-deals:
    runs-on: ubuntu-latest
    needs: [refresh-and-analytics, ebay-scrape]
    if: always() && needs.refresh-and-analytics.result == 'success'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Detect deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python detect_deals.py

  # —— Nightly analytics (market index, card scores, set scores) ————————
  nightly-analytics:
    runs-on: ubuntu-latest
    needs: [detect-deals]
    if: always() && needs.detect-deals.result != 'cancelled'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install supabase
      - name: Run nightly analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python nightly_analytics.py

  # —— REMOVED: force-refresh-trends ————————————————————————————————
  # This job was running refresh_card_trends via an old RPC on manual triggers,
  # conflicting with refresh-and-analytics which runs the Python script.
  # Both jobs truncated card_trends simultaneously causing data loss.
  # refresh_card_trends.py in refresh-and-analytics handles this correctly now.
