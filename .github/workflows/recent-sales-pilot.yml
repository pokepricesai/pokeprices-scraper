name: Recent-sales Pilot (Allow-list Only)

# Block 4B-S-5A — rotates the 3,000-card allow-list pilot across the week.
#
# Allow-list source:
#   public.recent_sales_card_allow_list  (provider='pricecharting' AND enabled=TRUE)
# Current count: 17,949 (raw_usd >= $5 cards). The runner deterministically
# sorts the allow-list and processes `--limit 3000` rows starting at
# `--offset $OFFSET`. The offset is computed from the UTC weekday so each
# day refreshes a different slice; over the week the full allow-list is
# covered.
#
# Day → offset map (UTC):
#   Mon (1) →     0  → rows 1-3000
#   Tue (2) →  3000  → rows 3001-6000
#   Wed (3) →  6000  → rows 6001-9000
#   Thu (4) →  9000  → rows 9001-12000
#   Fri (5) → 12000  → rows 12001-15000
#   Sat (6) → 15000  → rows 15001-17949 (partial tail = 2949 cards)
#   Sun (7) →     0  → rows 1-3000 (high-value head re-refresh)
#
# This workflow is INTENTIONALLY isolated from .github/workflows/nightly-scrape.yml.
# It does NOT enable full-catalogue ingestion, does NOT bypass the allow-list,
# and does NOT change daily_prices/card_volume/cards write paths.

on:
  schedule:
    # 13:00 UTC daily. The existing nightly-scrape workflow starts at
    # 08:00 UTC; its 6 parallel batches (300-min timeout each), plus
    # refresh-and-analytics, detect-deals, and nightly-analytics, typically
    # complete within 4 hours. 13:00 UTC leaves ~1 hour of headroom before
    # the pilot runs.
    - cron: '0 13 * * *'
  workflow_dispatch:

# Guarantee no two pilot runs overlap. A late-finishing scheduled run
# blocks the next scheduled run instead of racing; a manual dispatch
# queues behind any running scheduled run rather than cancelling it.
concurrency:
  group: recent-sales-pilot
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  # The ingestion module enforces a strict equals-"true" check on this
  # variable. Any other value (including unset) makes the run a no-op:
  # no Supabase write, no market_import_runs row, no recent_sales row.
  # To disable the pilot without deleting this file, change the value
  # below to "false" and commit.
  RECENT_SALES_INGESTION_ENABLED: "true"

jobs:
  pilot:
    name: Run 3000-card recent-sales pilot
    runs-on: ubuntu-latest
    # 180 min budget. Happy path at --delay-seconds 1.0 over 3,000 cards is
    # ~50 min. Headroom absorbs per-card parse/upsert cost and a moderate
    # rate of retries; a mass-throttle event still surfaces as a timeout
    # rather than silently absorbing.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # Day-of-week → offset (see header comment for the full map).
      # `date -u +%u` returns 1=Mon … 7=Sun. Sunday is pinned to offset 0
      # so the high-value head of the allow-list gets re-refreshed at the
      # week boundary; every other day advances by one 3000-card slice.
      # If you need to manually run a different slice, use
      # workflow_dispatch + edit the OFFSET below, or run the script
      # locally with `--offset <N> --batch-size 3000`.
      - name: Compute weekly rotation offset
        id: rotation
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ]; then
            OFFSET=0
          else
            OFFSET=$(( (DOW - 1) * 3000 ))
          fi
          echo "UTC weekday=$DOW → offset=$OFFSET"
          echo "offset=$OFFSET" >> "$GITHUB_OUTPUT"

      - name: Run 3000-card recent-sales pilot
        run: |
          python scripts/run_recent_sales_pilot.py \
            --offset ${{ steps.rotation.outputs.offset }} \
            --limit 3000 \
            --delay-seconds 1.0 \
            --max-retries 3 \
            --retry-backoff-seconds 10
